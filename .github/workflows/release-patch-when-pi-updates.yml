name: Release on main push

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Determine release level from merged PR labels
        id: release_level
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const commitSha = context.sha;

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'closed',
              base: 'main',
              sort: 'updated',
              direction: 'desc',
              per_page: 100,
            });

            const mergedPr = pulls.find(
              pr => pr.merged_at && pr.merge_commit_sha === commitSha
            );

            if (!mergedPr) {
              core.info('No merged PR associated with this commit. Skipping release.');
              core.setOutput('level', 'none');
              return;
            }

            const labels = (mergedPr.labels ?? []).map(label => label.name);
            let level = 'patch';

            if (labels.includes('release:none')) level = 'none';
            else if (labels.includes('release:major')) level = 'major';
            else if (labels.includes('release:minor')) level = 'minor';
            else if (labels.includes('release:patch')) level = 'patch';

            core.info(`Merged PR: #${mergedPr.number} (${mergedPr.html_url})`);
            core.info(`Labels: ${labels.join(', ') || '(none)'}`);
            core.info(`Selected release level: ${level}`);
            core.setOutput('level', level);

      - name: Skip release (release:none)
        if: steps.release_level.outputs.level == 'none'
        run: echo "Skipping release due to release:none label"

      - name: Checkout main
        if: steps.release_level.outputs.level != 'none'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Bun
        if: steps.release_level.outputs.level != 'none'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        if: steps.release_level.outputs.level != 'none'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        if: steps.release_level.outputs.level != 'none'
        run: bun install --frozen-lockfile

      - name: Install optional peer required for type-checking
        if: steps.release_level.outputs.level != 'none'
        run: npm install miniflare@^4 --no-save

      - name: Build and unit test
        if: steps.release_level.outputs.level != 'none'
        run: |
          bun run build
          bun run test:unit

      - name: Bump version and create local release commit/tag
        if: steps.release_level.outputs.level != 'none'
        env:
          RELEASE_LEVEL: ${{ steps.release_level.outputs.level }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          npm --no-git-tag-version --ignore-scripts version "$RELEASE_LEVEL"

          VERSION="v$(node -p "require('./package.json').version")"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          git add package.json
          git commit -m "chore(release): ${VERSION} [skip ci]"
          git tag "${VERSION}"

      - name: Publish to npm (Trusted Publishers)
        if: steps.release_level.outputs.level != 'none'
        run: npm publish --access public --provenance

      - name: Push release commit and tag
        if: steps.release_level.outputs.level != 'none'
        run: git push origin main --follow-tags
