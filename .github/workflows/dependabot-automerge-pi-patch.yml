name: Dependabot Pi patch

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  patch:
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Apply patch release label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr edit "$PR_URL" --add-label "release:patch"

      - name: Verify GitHub auto-merge repo setup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          allow_auto_merge="$(gh api "repos/$REPO" --jq '.allow_auto_merge')"
          if [[ "$allow_auto_merge" != "true" ]]; then
            echo "Repository auto-merge is disabled. Enable Settings > General > Pull Requests > Allow auto-merge."
            exit 1
          fi

          if ! gh api "repos/$REPO/branches/main/protection" >/dev/null 2>&1; then
            echo "Branch protection is not configured on main. GitHub auto-merge requires a protected branch with merge requirements such as required status checks."
            exit 1
          fi

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
