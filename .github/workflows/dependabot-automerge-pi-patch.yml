name: Dependabot Pi patch

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  patch:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Apply patch release label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr edit "$PR_URL" --add-label "release:patch"

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump package version on PR branch
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          git fetch --tags origin

          LATEST_TAG="$(git tag --list 'v*' --sort=-version:refname | head -n1)"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          NEXT_VERSION="$(node - "$LATEST_TAG" "$PACKAGE_VERSION" <<'NODE'
          const [latestTag, packageVersion] = process.argv.slice(2);

          const normalize = versionOrTag => {
            const normalized = versionOrTag.startsWith('v') ? versionOrTag.slice(1) : versionOrTag;
            if (!/^\d+\.\d+\.\d+$/.test(normalized)) {
              throw new Error(`Invalid semver version: ${versionOrTag}`);
            }
            return normalized;
          };

          const currentVersion = latestTag ? normalize(latestTag) : normalize(packageVersion);
          const [major, minor, patch] = currentVersion.split('.').map(Number);
          process.stdout.write(`${major}.${minor}.${patch + 1}`);
          NODE
          )"

          if [[ "$PACKAGE_VERSION" != "$NEXT_VERSION" ]]; then
            npm pkg set version="$NEXT_VERSION"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json
            git commit -m "chore(release): prepare v${NEXT_VERSION}"
            git push origin "HEAD:${PR_HEAD_REF}"
          else
            echo "package.json already at target version ${NEXT_VERSION}"
          fi

      - name: Verify GitHub auto-merge repo setup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          allow_auto_merge="$(gh api "repos/$REPO" --jq '.allow_auto_merge')"
          if [[ "$allow_auto_merge" != "true" ]]; then
            echo "Repository auto-merge is disabled. Enable Settings > General > Pull Requests > Allow auto-merge."
            exit 1
          fi

          if ! gh api "repos/$REPO/branches/main/protection" >/dev/null 2>&1; then
            echo "Branch protection is not configured on main. GitHub auto-merge requires a protected branch with merge requirements such as required status checks."
            exit 1
          fi

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
