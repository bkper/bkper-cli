name: Dependabot release labels

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  label:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Ensure release labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "release:patch" --color 0e8a16 --description "Publish patch version" || true
          gh label create "release:minor" --color 1d76db --description "Publish minor version" || true
          gh label create "release:major" --color b60205 --description "Publish major version" || true
          gh label create "deps:pi" --color 5319e7 --description "Pi dependency update" || true

      - name: Apply Pi dependency labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
        run: |
          set -euo pipefail

          if [[ "$DEPENDENCY_NAMES" != *"@mariozechner/pi-coding-agent"* ]]; then
            echo "Non-Pi dependency update. No release label applied."
            exit 0
          fi

          gh pr edit "$PR_URL" --add-label "deps:pi" --add-label "release:patch"
          echo "Applied labels: deps:pi, release:patch"
